name: skill-regression

# Matrix over all skills in this monorepo. Per-skill stdlib regression runs
# on every push / PR; skill-specific extras (CLI smokes, contract tests)
# gated by `if: matrix.skill == '<name>'`. Adding a new skill = sibling
# top-level dir + append to `matrix.skill` list below.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # 一个 skill 挂不挡其他 skill 的反馈
      matrix:
        # 加新 skill: 在这里 append skill 文件夹名,sibling 到 cue-buddy/
        # 每个 skill 须有 scripts/test_skill_regression.py + SKILL.md frontmatter
        skill: [cue-buddy, cue-research]
        # 跟 cubemanus backend pinned 3.12 一致,plus 一个 rolling latest
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ============================================================
      # Shared per-skill gates (run for every skill in the matrix)
      # ============================================================

      - name: Skill frontmatter validator (Codex/Anthropic schema)
        # codex r3 finding: validator-blocker (e.g. top-level `version` key)
        # 之前未在 CI 跑,只本地 catch。每个 skill 的 SKILL.md frontmatter 都跑。
        run: |
          python3 -m pip install --quiet pyyaml
          python3 - <<PY
          import re, sys, pathlib, yaml
          skill = '${{ matrix.skill }}'
          md = pathlib.Path(f'{skill}/SKILL.md').read_text(encoding='utf-8')
          m = re.match(r'^---\n(.*?)\n---\n', md, re.S)
          assert m, f'{skill}/SKILL.md missing frontmatter'
          fm = yaml.safe_load(m.group(1))
          allowed = {'allowed-tools', 'description', 'license', 'metadata', 'name'}
          unexpected = set(fm.keys()) - allowed
          assert not unexpected, f'{skill}/SKILL.md frontmatter has unexpected keys: {unexpected}'
          assert 'name' in fm and 'description' in fm, f'{skill}/SKILL.md name/description required'
          print(f'{skill}/SKILL.md frontmatter OK; keys={sorted(fm.keys())}')
          PY

      - name: Run ${{ matrix.skill }} skill regression
        # 每个 skill 须有 scripts/test_skill_regression.py (stdlib unittest)
        run: python3 ${{ matrix.skill }}/scripts/test_skill_regression.py

      # ============================================================
      # cue-buddy-specific extras (cue-buddy template authoring skill)
      # 加新 skill 时若有独有 contract/CLI smoke,再加一组 `if:` 块
      # ============================================================

      - name: (cue-buddy) cue_api client contract test (stdlib mock server)
        if: matrix.skill == 'cue-buddy'
        # codex r3: 把"capabilities 合约"放进 CI 而非只 local dev 可跑。
        # http.server + threading mock,不依赖 cubemanus/uvicorn/fastapi。
        # 验 client wire format:URL/Bearer/query 序列化/ETag 304/4xx 错误传播。
        run: python3 ${{ matrix.skill }}/scripts/test_cue_api_client_contract.py

      - name: (cue-buddy) CLI smoke — validate_template.py --help
        if: matrix.skill == 'cue-buddy'
        # codex r2: argparse --help 之前被当文件路径读 FileNotFoundError,现已修。
        run: |
          python3 ${{ matrix.skill }}/scripts/validate_template.py --help | grep -q "validate_template.py"
          python3 ${{ matrix.skill }}/scripts/validate_template.py >/dev/null

      - name: (cue-buddy) CLI smoke — cue_api.py capabilities subcommand
        if: matrix.skill == 'cue-buddy'
        # codex r3: doc 说有 +capabilities verb 但缺 CLI,现已加。
        # 无 API key 应 exit 2 + 'API key' 提示,而非 KeyError。
        run: |
          set +e
          out=$(python3 ${{ matrix.skill }}/scripts/cue_api.py capabilities 2>&1)
          ec=$?
          set -e
          echo "$out"
          test "$ec" -ne 0
          echo "$out" | grep -qi "API key"

      - name: (cue-buddy) CLI smoke — cue_api.py replay subcommand known
        if: matrix.skill == 'cue-buddy'
        # codex r5: test_template.py fallback hint 写 'cue_api.py replay <conv_id>',
        # 之前 CLI 没此子命令报 unknown cmd。现已加 → 无 conv_id 应 print usage + exit 2。
        run: |
          set +e
          out=$(python3 ${{ matrix.skill }}/scripts/cue_api.py replay 2>&1)
          ec=$?
          set -e
          echo "$out"
          echo "$out" | grep -q "usage: cue_api.py replay"
          test "$ec" -eq 2

      - name: (cue-buddy) Validator self-check (regex 5-family coverage)
        if: matrix.skill == 'cue-buddy'
        # codex r3 r1 Block A: TOOL_NAME_LEAK_RE 应覆盖 get_*/list_*/find_*/
        # search_tool*/crawl_tool* 5 工具家族(过去 regex 漏后两类)。
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, '${{ matrix.skill }}/scripts')
          from validate_template import validate, FORBIDDEN_TOOL_PREFIXES, TOOL_NAME_LEAK_RE
          assert callable(validate)
          assert 'search_tool' in FORBIDDEN_TOOL_PREFIXES
          for sample in ('get_xxx', 'list_xxx', 'find_xxx', 'search_tool_xxx', 'crawl_tool_xxx'):
              assert TOOL_NAME_LEAK_RE.search(sample), sample
          print('validate_template import + regex coverage OK')
          "
